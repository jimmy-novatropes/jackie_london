name: (PROD) Create or Update Step Function Workflow

on: [workflow_dispatch]

jobs:
  deploy-stepfunction:
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout repo
        uses: actions/checkout@v2

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Create or Ensure IAM Role
        env:
          ROLE_NAME: StepFunctions-bc_2_hubspot_sync-role
        run: |
          set -e

          echo "Checking if IAM role exists..."

          if aws iam get-role --role-name "$ROLE_NAME" > /dev/null 2>&1; then
            echo "✅ Role exists"
          else
            echo "⚠️ Creating IAM role..."

            cat <<EOF > trust-policy.json
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Effect": "Allow",
                  "Principal": {
                    "Service": "states.amazonaws.com"
                  },
                  "Action": "sts:AssumeRole"
                }
              ]
            }
            EOF

            aws iam create-role \
              --role-name "$ROLE_NAME" \
              --assume-role-policy-document file://trust-policy.json

            echo "Attaching policies..."

            # Allow Step Functions to invoke Lambda
            aws iam attach-role-policy \
              --role-name "$ROLE_NAME" \
              --policy-arn arn:aws:iam::aws:policy/service-role/AWSLambdaRole

            aws iam attach-role-policy \
              --role-name "$ROLE_NAME" \
              --policy-arn arn:aws:iam::aws:policy/AWSStepFunctionsFullAccess

            # Optional: more restrictive inline policy (recommended instead of full access)
          fi

          ROLE_ARN=$(aws iam get-role --role-name "$ROLE_NAME" --query 'Role.Arn' --output text)
          echo "ROLE_ARN=$ROLE_ARN" >> $GITHUB_ENV

      - name: Create or Update Step Function
        env:
          STATE_MACHINE_NAME: bc_2_hubspot_sync
          STATE_MACHINE_ARN: arn:aws:states:us-east-1:630977122946:stateMachine:bc_2_hubspot_sync
        run: |
          set -e

          echo "Checking if state machine exists..."

          if aws stepfunctions describe-state-machine --state-machine-arn "$STATE_MACHINE_ARN" > /dev/null 2>&1; then
            echo "✅ Updating state machine..."
            aws stepfunctions update-state-machine \
              --state-machine-arn "$STATE_MACHINE_ARN" \
              --definition file://stepfunctions/stepfunction_definition.json \
              --role-arn "$ROLE_ARN"
          else
            echo "⚠️ Creating state machine..."
            aws stepfunctions create-state-machine \
              --name "$STATE_MACHINE_NAME" \
              --definition file://stepfunctions/stepfunction_definition.json \
              --role-arn "$ROLE_ARN" \
              --type STANDARD
          fi